<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM Contact Manager — Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f1f5f9;
      padding: 24px;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 12px;
    }
    .logo h1 { font-size: 20px; font-weight: 700; }
    .logo p { font-size: 13px; color: #94a3b8; margin-top: 4px; }

    .divider {
      border: none;
      border-top: 1px solid #334155;
      margin: 20px 0;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #64748b;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #94a3b8; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 11px 14px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus { border-color: #3b82f6; }
    input::placeholder { color: #475569; }

    .hint {
      font-size: 12px;
      color: #64748b;
      margin-top: 5px;
      line-height: 1.4;
    }
    .hint a { color: #3b82f6; text-decoration: none; }
    .hint a:hover { text-decoration: underline; }

    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px;
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .footer-link {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: #94a3b8;
    }
    .footer-link a { color: #3b82f6; text-decoration: none; font-weight: 500; }
    .footer-link a:hover { text-decoration: underline; }

    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #fca5a5;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">📇</div>
      <h1>Create Account</h1>
      <p>Create your account for the web app</p>
    </div>

    <div class="error" id="error-msg"></div>

    <form id="register-form">
      <div class="section-label">Account</div>

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Choose a username" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Create a password" autocomplete="new-password" required />
      </div>
      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" placeholder="Repeat your password" autocomplete="new-password" required />
      </div>

      <hr class="divider" />
      <div class="section-label">Monday.com Integration (Optional)</div>

      <div class="form-group">
        <label for="api-token">API Token</label>
        <input type="password" id="api-token" placeholder="Optional until you are ready to save contacts"  />
        <p class="hint">
          Find it in Monday.com → Profile picture → Developers → API v2 Token.
        </p>
      </div>
      <div class="form-group">
        <label for="board-id">Board ID</label>
        <input type="text" id="board-id" placeholder="Optional (example: 1234567890)"  />
        <p class="hint">
          Open your board in Monday.com and copy the number from the URL:
          <code>monday.com/boards/<strong>1234567890</strong></code>
        </p>
      </div>

      <button type="submit" class="btn" id="submit-btn">Create Account</button>
    </form>

    <div class="footer-link">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>

  <script>
    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';

      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      if (password !== confirm) {
        errEl.textContent = 'Passwords do not match.';
        errEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account…';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password,
            monday_api_token: document.getElementById('api-token').value,
            monday_board_id: document.getElementById('board-id').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Registration failed');
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = 'dashboard.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
